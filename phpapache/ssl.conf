<VirtualHost *:80>
ServerName corentinrozet.eu
ServerAlias www.corentinrozet.eu

Redirect permanent / https://corentinrozet.eu/
</VirtualHost>

<VirtualHost _default_:443>
ServerAdmin corentin.rozet@epitech.eu    
ServerName corentinrozet.eu
ServerAlias www.corentinrozet.eu

DocumentRoot /var/www/html        

Protocols h2 http:/1.1

<If "%{HTTP_HOST} == 'www.corentinrozet.eu'">
    Redirect permanent / https://corentinrozet.eu/
</If>

ErrorLog ${APACHE_LOG_DIR}/error.log 
CustomLog ${APACHE_LOG_DIR}/access.log combined      

SSLEngine on       

SSLCertificateFile /etc/apache2/ssl_keys/corentinrozet.crt
SSLCertificateKeyFile /etc/apache2/ssl_keys/corentinrozet.key   

<FilesMatch "\.(cgi|shtml|phtml|php|html)$"> 
SSLOptions +StdEnvVars        
</FilesMatch>                 
<Directory /usr/lib/cgi-bin>  
SSLOptions +StdEnvVars        
</Directory>                  

<Directory /var/www/html>     
Options Indexes FollowSymLinks
AllowOverride all       
Require all granted     
</Directory>            
DirectoryIndex index.html


BrowserMatch "MSIE [2-6]" nokeepalive ssl-unclean-shutdown downgrade-1.0 force-response-1.0                                  
BrowserMatch "MSIE [17-9]" ssl-unclean-shutdown                   
</VirtualHost>                                                    